# Trajectory generation pipeline configuration

# ── MLLM API Settings ──────────────────────────────────────────────────────────
api:
  base_url: "https://www.blueshirtmap.com/v1"   # OpenAI or compatible endpoint
  model: "gemini-2.5-pro"                          # Model to use for trajectory generation
  api_key_env: "OPENAI_API_KEY"            # Environment variable name for API key
  max_tokens: 8192
  temperature: 0.7                         # Low temperature for deterministic editing
  request_timeout: 60                      # Seconds per API call

# ── Trajectory Generation ──────────────────────────────────────────────────────
generation:
  max_turns: 8                             # Maximum editing steps per trajectory
  convergence_delta_e: 4.0                # Stop early if DeltaE < this value
  thumbnail_size: [512, 512]              # Size for intermediate step thumbnails
  save_intermediate_images: true           # Save intermediate step images to disk
  output_dir: "trajectories"              # Directory to save generated trajectories
  image_quality: 85                        # JPEG quality for intermediate images (1-95)

# ── Quality Filter Thresholds ──────────────────────────────────────────────────
filter:
  max_final_delta_e: 10.0                 # Maximum allowed final DeltaE
  min_final_psnr: 20.0                    # Minimum required final PSNR
  min_improvement: 2.0                    # Minimum DeltaE improvement over initial
  max_regression_ratio: 1.3              # Max allowed DeltaE regression per step
  max_tool_repeats: 2                     # Max times same tool can be used
  min_steps: 3                            # Minimum number of steps in a trajectory
  max_steps: 8                            # Maximum number of steps in a trajectory
  allow_short_if_initial_delta_e_below: 10.0  # Allow short accepted chains for already-close pairs

# ── Metrics Computation ────────────────────────────────────────────────────────
metrics:
  eval_size: [64, 64]                     # Image size for metric computation (speed)
  use_lpips: true                         # Whether to compute LPIPS (requires GPU or is slow)
  device: "cpu"                           # "cpu" or "cuda"

scoring:
  mode: "hybrid"                          # delta_e / l1 / l2 / pixel / hybrid
  weights:
    delta_e: 1.0
    l1: 24.0
    l2: 18.0
    lpips: 8.0
    ssim_error: 6.0
    stat_residual: 4.0
    edit_cost: 0.8
    repeat_penalty: 0.08
    sign_flip_penalty: 0.10

# ── Planner / Search ──────────────────────────────────────────────────────────
planner:
  role: "planner"                         # Informational label for trajectory metadata
  candidates_per_call: 6
  diversity_calls: 2
  temperatures: [0.4, 0.9]
  allow_heuristic_fallback: false

mcts:
  num_simulations: 48
  c_puct: 1.4
  max_actions_per_node: 8
  rollout_horizon: 8
  min_step_gain: 0.01
  regression_tolerance: 0.05
  prune_regression_tolerance: null
  save_full_tree: true

debug:
  save_search_debug: true

# ── Dataset ────────────────────────────────────────────────────────────────────
dataset:
  type: "mit5k"                           # "mit5k" or "ppr10k"
  pairs_file: "data/mit5k_pairs.json"
  max_samples: null                       # null = process all; integer = process N samples
  shuffle: false
  start_idx: 0

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level: "INFO"                           # DEBUG / INFO / WARNING
  log_file: "trajectory_forge.log"
  log_every_n: 10                         # Print progress every N trajectories
